<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="utf-8">
    <title>Demo 5 - Teller</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="shared.css">
</head>
<body class="demo5">
    <div class="center">
        <div class="panel">
            <div id="count">0</div>
            <div class="controls">
                <button id="toggleBtn">Start</button>
                <button id="clickToggle" class="small">Enable Click +1</button>
                <button id="audioToggle" class="small">Enable Mic</button>
                <button id="resetBtn" class="secondary small">Reset</button>
            </div>
            <div class="status" id="status">Status: stopped</div>
            <div class="ex-inline-1">
                <div class="ex-inline-2">
                    <div id="micFill" class="ex-inline-3"></div>
                </div>
                <div id="micLbl" class="ex-inline-4">mic: off</div>
            </div>
        </div>
    </div>

    <script src="demo5.js"></script>
</body>
</html>
